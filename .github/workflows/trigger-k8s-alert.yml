name: Trigger K8s Alert

on:
  workflow_dispatch:
    inputs:
      verify_datadog:
        description: "Wait and verify logs appear in Datadog"
        type: boolean
        default: false
  schedule:
    - cron: "0 9 * * 1"  # every Monday 9am UTC

jobs:
  trigger-alert:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: datadoghq.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Identify CI IAM principal
        run: aws sts get-caller-identity

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --name tracer-eks-test --region us-east-1

      - name: Run failing job on EKS
        run: |
          python -m tests.test_case_kubernetes.test_eks \
            --skip-deploy --skip-destroy --skip-monitors \
            ${{ inputs.verify_datadog == false && '--skip-verify' || '' }}
