name: Synthetic Tests

on:
  schedule:
    - cron: "0 9 * * 1"  # every Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-synthetic:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run synthetic tests (levels 1-2)
        run: python -m pytest -m synthetic -k "level1 or level2" -v tests/synthetic/

      - name: Run synthetic tests (levels 3-4)
        run: python -m pytest -m synthetic -k "level3 or level4" -v tests/synthetic/
